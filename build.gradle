plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {                                            
      // canonical: compile → implementation
      implementation 'org.springframework.boot:spring-boot-starter-web:3.2.0'                                                                                                                            
   
      // canonical: compile → api                                                                                                                                                                        
      api 'com.google.guava:guava:32.1.3-jre'               
                                                                                                                                                                                                         
      // canonical: runtimeOnly
      runtimeOnly 'org.postgresql:postgresql:42.7.1'                                                                                                                                                     
                                                            
      // canonical: compileOnly
      compileOnly 'org.projectlombok:lombok:1.18.30'
                                                                                                                                                                                                         
      // canonical: annotationProcessor
      annotationProcessor 'org.projectlombok:lombok:1.18.30'                                                                                                                                             
                                                            
      // canonical: test → testImplementation
      testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
                                                                                                                                                                                                         
      // canonical: test → testRuntimeOnly
      testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.1'                                                                                                                                
                                                            
      // canonical: optional (Spring Boot Gradle convention)                                                                                                                                             
      optional 'org.springframework.boot:spring-boot-configuration-processor:3.2.0'
  }   

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'io.deptools.App'
}
