plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
  implementation 'org.apache.logging.log4j:log4j-core:2.17.0'
  implementation 'javax.activation:activation:1.1.1'
  implementation 'com.google.firebase:firebase-crashlytics-gradle:2.7.1'
  implementation 'com.itextpdf:itext-core:9.5.0'
  implementation 'org.springframework.boot:spring-boot-starter-web:4.0.3'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'io.deptools.App'
}
